<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Enhanced Calculator</title>
  <link rel="stylesheet" href="enhanced-calculator.css">
</head>
<body>
  <div class="calculator">
    <h1>Enhanced Calculator</h1>
    <input type="number" id="num1" placeholder="First number">
    <input type="number" id="num2" placeholder="Second number">

    <!-- Operation Buttons -->
    <div class="buttons">
      <button onclick="calculate('add')">+</button>
      <button onclick="calculate('subtract')">-</button>
      <button onclick="calculate('multiply')">×</button>
      <button onclick="calculate('divide')">÷</button>
      <button onclick="calculate('power')">^</button>
      <button onclick="calculate('modulus')">%</button>
      <button onclick="calculate('squareRoot')">√</button>
      <button onclick="calculate('percentage')">% of</button>
      <button onclick="clearCalculator()">Clear</button>
    </div>

    <!-- Result Display -->
    <div id="result">Result will appear here</div>

    <!-- History -->
    <h2>Calculation History</h2>
    <ul id="history"></ul>
    <button onclick="clearHistory()">Clear History</button>
  </div>

  <script src="enhanced-calculator.js"></script>
</body>
</html>
