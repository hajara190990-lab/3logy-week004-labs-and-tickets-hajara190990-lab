<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product Card Component</title>
  <link rel="stylesheet" href="product-card.css" />
</head>
<body>
  <div class="product-card">
    <div class="favorite-icon">❤️</div>
    <img src="stylish-sneakers_839182-21605.jpg" alt="Product Image" class="product-image" />
    <h2 class="product-title">Stylish Shoes</h2>
    <p class="product-description">Comfortable and trendy sneakers perfect for everyday wear.</p>
    
    <div class="price">#190000</div>
    <button class="add-to-cart">Add to Cart</button>
  </div>
</body>
</html>
